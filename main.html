<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy App | Project Brief Builder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #f5f9ff;
      --bg-card: #ffffff;
      --primary: #0b7ff3;
      --primary-2: #12a8ff;
      --primary-dark: #061b5b;
      --accent: #0b4fd8;
      --text-main: #07133a;
      --text-muted: #667085;
      --border: #d9e7ff;
      --soft-blue: #eef6ff;
      --danger: #b91c1c;
      --success: #087a3f;
      --shadow: 0 24px 60px rgba(6, 27, 91, 0.12);
      --shadow-soft: 0 14px 35px rgba(6, 27, 91, 0.08);
      --radius: 28px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: "Poppins", "Cairo", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 10% 0%, rgba(18, 168, 255, 0.18), transparent 34%),
        radial-gradient(circle at 90% 100%, rgba(6, 27, 91, 0.12), transparent 36%),
        linear-gradient(180deg, #ffffff 0%, var(--bg-main) 48%, #edf5ff 100%);
      overflow-x: hidden;
    }

    body[dir="rtl"] { font-family: "Cairo", "Poppins", sans-serif; }
    button, input, textarea, select { font-family: inherit; }

    .app { width: min(1160px, 94%); margin: 0 auto; padding: 18px 0 48px; }

    .topbar {
      position: sticky; top: 10px; z-index: 100;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      margin-bottom: 26px; padding: 12px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(217, 231, 255, 0.92);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
    }

    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }

    .logo-box {
      width: auto; height: 78px; border-radius: 0;
      background: transparent; border: 0;
      display: flex; align-items: center; justify-content: flex-start;
      box-shadow: none; overflow: hidden; flex: 0 0 auto;
      color: var(--primary); font-weight: 900;
    }

    .logo-box img { width: auto; height: 100%; max-width: none; object-fit: contain; object-position: left center; display: block; }
    .brand-text { display: none; min-width: 0; }
    .brand-text h3 { font-size: 1rem; font-weight: 900; color: var(--text-main); line-height: 1.2; }
    .brand-text p { color: var(--text-muted); font-size: 0.82rem; line-height: 1.4; }

    .lang-toggle {
      display: flex; gap: 8px; padding: 7px;
      border-radius: 999px; background: #fff; border: 1px solid var(--border);
      box-shadow: var(--shadow-soft); flex: 0 0 auto;
    }

    .lang-btn {
      border: 0; border-radius: 999px; background: transparent; color: var(--text-muted);
      padding: 9px 16px; cursor: pointer; font-weight: 800; transition: 0.25s ease;
    }

    .lang-btn.active { background: var(--primary-dark); color: #fff; }
    svg { width: 20px; height: 20px; stroke-width: 2.1; flex: 0 0 auto; }

    .screen { display: none; }
    .screen.active { display: block; animation: screenIn 0.45s ease both; }
    @keyframes screenIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

    .hero-card, .quiz-card, .result-card, .thanks-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden; position: relative;
    }

    .hero-card { min-height: 660px; display: grid; grid-template-columns: 1.05fr 0.95fr; }
    .hero-content { padding: clamp(28px, 5vw, 58px); display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 3; }

    .badge {
      width: fit-content; display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 15px; border-radius: 999px;
      background: rgba(11, 127, 243, 0.09); color: var(--accent);
      font-weight: 900; font-size: 0.88rem; margin-bottom: 22px;
    }

    .hero-title {
      font-size: clamp(2.1rem, 5vw, 4.7rem); line-height: 1.04;
      letter-spacing: -1.6px; color: var(--primary-dark); margin-bottom: 22px; font-weight: 900;
    }

    body[dir="rtl"] .hero-title { letter-spacing: 0; }
    .hero-title span { background: linear-gradient(90deg, var(--primary), var(--primary-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }

    .hero-desc { max-width: 670px; font-size: 1.05rem; color: var(--text-muted); line-height: 1.9; margin-bottom: 32px; }
    .actions { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; }

    .btn {
      border: 0; min-height: 52px; border-radius: 16px; padding: 15px 24px;
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      text-decoration: none; font-weight: 900; font-size: 0.96rem; transition: 0.25s ease;
    }

    .btn-primary { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: #fff; box-shadow: 0 18px 38px rgba(11, 127, 243, 0.24); }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 22px 48px rgba(11, 127, 243, 0.30); }
    .btn-soft { background: #edf5ff; color: var(--primary-dark); }
    .btn-soft:hover { transform: translateY(-3px); background: #dcecff; }
    .btn-outline { background: #fff; color: var(--primary-dark); border: 1px solid var(--border); }
    .btn[disabled] { opacity: 0.62; cursor: not-allowed; transform: none !important; }

    .trust-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 670px; margin-top: 34px; }
    .trust-item { padding: 14px; border-radius: 18px; background: rgba(255, 255, 255, 0.82); border: 1px solid var(--border); color: var(--text-muted); font-size: 0.86rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }

    .hero-visual {
      position: relative; overflow: hidden; min-height: 520px; padding: 48px;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 70% 35%, rgba(18, 168, 255, 0.22), transparent 28%), linear-gradient(160deg, #ffffff, #eff7ff 52%, #dff1ff);
    }

    .hero-visual::before {
      content: ""; position: absolute; width: 440px; height: 440px; border-radius: 999px;
      background: radial-gradient(circle, rgba(11,127,243,0.16), transparent 66%);
      top: 40px; right: 28px; animation: softPulse 4s ease-in-out infinite;
    }

    @keyframes softPulse { 0%, 100% { transform: scale(1); opacity: .8; } 50% { transform: scale(1.08); opacity: 1; } }

    .floating-card {
      position: absolute; z-index: 1; display: flex; align-items: center; gap: 10px;
      padding: 16px 18px; border-radius: 22px;
      background: rgba(255, 255, 255, 0.88); border: 1px solid var(--border);
      color: var(--primary-dark); font-weight: 900; box-shadow: var(--shadow-soft);
      animation: float 4s ease-in-out infinite; pointer-events: none;
    }

    .floating-card.one { top: 78px; left: 36px; }
    .floating-card.two { right: 34px; top: 175px; animation-delay: 1s; }
    .floating-card.three { bottom: 92px; left: 68px; animation-delay: 2s; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }

    .phone-wrap { position: relative; z-index: 8; cursor: grab; touch-action: none; user-select: none; }
    .phone-wrap:active { cursor: grabbing; }

    .phone-mockup {
      width: 292px; height: 536px; border-radius: 42px; background: #111827;
      padding: 14px; box-shadow: 0 35px 70px rgba(6, 27, 91, 0.24);
      transform: rotate(4deg); position: relative; z-index: 10;
    }

    .phone-screen { height: 100%; border-radius: 32px; background: #f8fbff; overflow: hidden; padding: 22px; }
    .mini-header { width: 90px; height: 12px; border-radius: 999px; background: linear-gradient(90deg, var(--primary-dark), var(--primary)); margin-bottom: 22px; }
    .mini-line { height: 12px; border-radius: 999px; background: #d9e7ff; margin-bottom: 12px; }
    .mini-line.short { width: 60%; }
    .mini-line.medium { width: 80%; }
    .mini-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 24px; }
    .mini-box { height: 82px; border-radius: 18px; background: linear-gradient(135deg, #fff, #edf5ff); border: 1px solid var(--border); display: grid; place-items: center; color: var(--primary); }
    .mini-box svg { width: 34px; height: 34px; }

    .quiz-card { padding: clamp(22px, 4vw, 38px); min-height: 650px; }
    .quiz-header { display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; margin-bottom: 26px; }
    .step-pill { padding: 10px 14px; border-radius: 999px; background: rgba(11, 127, 243, 0.09); color: var(--accent); font-weight: 900; white-space: nowrap; }
    .progress-wrap { margin-bottom: 30px; }
    .progress-meta { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 0.92rem; font-weight: 800; margin-bottom: 9px; }
    .progress-bar { height: 12px; background: #dcecff; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary-dark), var(--primary), var(--primary-2)); border-radius: 999px; transition: width 0.35s ease; }
    .question-title { font-size: clamp(1.45rem, 3vw, 2.6rem); color: var(--primary-dark); margin-bottom: 12px; line-height: 1.25; font-weight: 900; }
    .question-subtitle { color: var(--text-muted); line-height: 1.8; font-size: 1rem; max-width: 820px; }
    .required-mark { color: var(--danger); font-weight: 900; }
    .optional-mark { color: var(--accent); font-weight: 900; font-size: 0.92rem; }

    .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 28px 0; }
    .option-card { border: 2px solid var(--border); background: #fff; border-radius: 22px; padding: 22px; min-height: 150px; cursor: pointer; transition: 0.25s ease; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; user-select: none; }
    .option-card::after { content: ""; position: absolute; width: 90px; height: 90px; right: -30px; bottom: -30px; border-radius: 999px; background: rgba(18, 168, 255, 0.12); transition: 0.25s ease; }
    body[dir="rtl"] .option-card::after { right: auto; left: -30px; }
    .option-card:hover { transform: translateY(-5px); border-color: var(--primary-2); box-shadow: 0 16px 35px rgba(6, 27, 91, 0.08); }
    .option-card.selected { border-color: var(--primary); background: #f1f7ff; box-shadow: 0 18px 40px rgba(11, 127, 243, 0.14); }
    .option-card.selected::before { content: "✓"; position: absolute; top: 14px; right: 14px; width: 28px; height: 28px; border-radius: 999px; background: var(--success); color: #fff; display: grid; place-items: center; font-weight: 900; z-index: 3; }
    body[dir="rtl"] .option-card.selected::before { right: auto; left: 14px; }
    .option-icon { width: 54px; height: 54px; border-radius: 18px; background: rgba(11, 127, 243, 0.08); color: var(--primary); display: grid; place-items: center; margin-bottom: 16px; position: relative; z-index: 2; }
    .option-title { font-size: 1.05rem; font-weight: 900; color: var(--primary-dark); margin-bottom: 8px; position: relative; z-index: 2; }
    .option-desc { font-size: 0.88rem; color: var(--text-muted); line-height: 1.6; position: relative; z-index: 2; }

    .form-area { display: grid; gap: 18px; margin-top: 28px; max-width: 900px; }
    .field-group { display: grid; gap: 8px; }
    .field-label { font-weight: 900; color: var(--primary-dark); font-size: 0.95rem; }
    .input, .textarea, .select { width: 100%; border: 2px solid var(--border); border-radius: 18px; background: #fff; padding: 16px 18px; font-size: 1rem; color: var(--text-main); outline: none; transition: 0.2s ease; }
    .textarea { min-height: 120px; resize: vertical; }
    .input:focus, .textarea:focus, .select:focus { border-color: var(--primary-2); box-shadow: 0 0 0 4px rgba(18, 168, 255, 0.14); }
    .custom-answer { margin-top: 18px; max-width: 720px; }

    .file-upload { border: 2px dashed var(--border); border-radius: 22px; padding: 20px; background: #f8fbff; display: grid; gap: 14px; }
    .upload-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .logo-preview { width: 92px; height: 92px; border-radius: 20px; border: 1px solid var(--border); background: #fff; display: grid; place-items: center; overflow: hidden; color: var(--text-muted); font-size: 0.78rem; text-align: center; padding: 8px; }
    .logo-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .color-picker-card { padding: 14px; border-radius: 18px; border: 1px solid var(--border); background: #f8fbff; display: grid; gap: 10px; }
    .color-picker-card input[type="color"] { width: 100%; height: 46px; border: 0; background: transparent; cursor: pointer; padding: 0; }
    .color-name { font-size: 0.82rem; color: var(--text-muted); font-weight: 900; }

    .error-box, .success-box { margin-top: 20px; padding: 14px 16px; border-radius: 16px; font-weight: 900; display: none; }
    .error-box { color: var(--danger); background: rgba(185, 28, 28, 0.08); border: 1px solid rgba(185, 28, 28, 0.18); }
    .success-box { color: var(--success); background: rgba(21, 128, 61, 0.08); border: 1px solid rgba(21, 128, 61, 0.18); }
    .quiz-footer { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 28px; }
    .helper-note { color: var(--text-muted); font-size: 0.9rem; font-weight: 700; text-align: center; }

    .result-card, .thanks-card { padding: clamp(24px, 4vw, 44px); }
    .result-top { text-align: center; max-width: 820px; margin: 0 auto 32px; }
    .result-icon { width: 78px; height: 78px; margin: 0 auto 18px; border-radius: 28px; background: rgba(11, 127, 243, 0.10); color: var(--primary); display: grid; place-items: center; }
    .result-icon svg { width: 38px; height: 38px; }
    .result-title { font-size: clamp(1.8rem, 4vw, 3.35rem); color: var(--primary-dark); margin-bottom: 12px; font-weight: 900; }
    .result-desc { color: var(--text-muted); line-height: 1.8; }
    .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin: 28px 0; }
    .summary-item { padding: 18px; border-radius: 18px; background: #f1f7ff; border: 1px solid var(--border); page-break-inside: avoid; }
    .summary-item span { display: block; color: var(--text-muted); font-size: 0.85rem; font-weight: 900; margin-bottom: 6px; }
    .summary-item strong { color: var(--primary-dark); font-size: 1rem; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
    .color-summary { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .color-dot { width: 28px; height: 28px; border-radius: 999px; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.12); }

    .thanks-card { text-align: center; min-height: 560px; display: grid; place-items: center; overflow: hidden; }
    .thanks-card::before { content: ""; position: absolute; width: 520px; height: 520px; border-radius: 999px; background: radial-gradient(circle, rgba(18,168,255,0.18), transparent 62%); top: -180px; right: -160px; animation: pulseGlow 3.5s ease-in-out infinite; }
    .thanks-card::after { content: ""; position: absolute; width: 420px; height: 420px; border-radius: 999px; background: radial-gradient(circle, rgba(6,27,91,0.10), transparent 65%); bottom: -170px; left: -140px; animation: pulseGlow 4.2s ease-in-out infinite reverse; }
    @keyframes pulseGlow { 0%,100% { transform: scale(1); opacity: .8; } 50% { transform: scale(1.08); opacity: 1; } }
    .thanks-inner { max-width: 760px; position: relative; z-index: 2; }
    .thanks-logo { width: 136px; height: 136px; border-radius: 36px; margin: 0 auto; background: #fff; border: 1px solid var(--border); display: grid; place-items: center; color: var(--primary); font-size: 2rem; font-weight: 900; box-shadow: var(--shadow); overflow: hidden; animation: logoPop 0.8s cubic-bezier(.2,.8,.2,1) both; }
    .thanks-logo img { width: 100%; height: 100%; object-fit: contain; padding: 14px; }
    @keyframes logoPop { from { transform: translateY(18px) scale(.86); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
    .thanks-title { font-size: clamp(2rem, 5vw, 4rem); color: var(--primary-dark); margin: 20px 0 14px; font-weight: 900; }
    .thanks-desc { color: var(--text-muted); line-height: 1.9; font-size: 1.05rem; }
    .hidden { display: none !important; }

    @media (max-width: 980px) {
      .hero-card { grid-template-columns: 1fr; }
      .hero-visual { min-height: 420px; }
      .options-grid { grid-template-columns: repeat(2, 1fr); }
      .color-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 700px) {
      .app { width: min(100% - 22px, 1160px); padding-top: 10px; }
      .topbar { top: 8px; align-items: stretch; flex-direction: column; border-radius: 18px; }
      .brand-text h3 { font-size: 0.94rem; }
      .brand-text p { font-size: 0.76rem; }
      .lang-toggle { width: 100%; }
      .lang-btn { flex: 1; }
      .hero-card, .quiz-card, .result-card, .thanks-card { border-radius: 22px; }
      .hero-content { padding: 28px 22px; }
      .hero-title { font-size: clamp(2.05rem, 11vw, 3.2rem); }
      .hero-desc { font-size: 0.98rem; }
      .actions, .quiz-footer { flex-direction: column; align-items: stretch; }
      .btn { width: 100%; }
      .trust-row { grid-template-columns: 1fr; }
      .hero-visual { min-height: 360px; padding: 26px; }
      .phone-mockup { width: 230px; height: 425px; transform: rotate(2deg); }
      .phone-screen { padding: 18px; }
      .mini-box { height: 66px; }
      .floating-card { display: none; }
      .quiz-header { flex-direction: column; gap: 14px; }
      .step-pill { width: fit-content; }
      .question-title { font-size: 1.55rem; }
      .question-subtitle { font-size: 0.94rem; }
      .options-grid, .summary-grid, .color-grid { grid-template-columns: 1fr; }
      .option-card { min-height: 132px; padding: 18px; }
      .option-icon { width: 48px; height: 48px; margin-bottom: 12px; }
      .progress-meta { font-size: 0.82rem; }
      .helper-note { order: -1; }
    }

    @media print {
      body { background: #fff !important; }
      .topbar, .actions, #welcomeScreen, #quizScreen, #thanksScreen { display: none !important; }
      #resultScreen, .screen.active { display: block !important; }
      .app { width: 100%; padding: 0; }
      .result-card { box-shadow: none; border: 0; padding: 0; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body dir="ltr">
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo-box" id="brandLogo">EA</div>
        <div class="brand-text">
          <h3 data-i18n="brandTitle">Easy App</h3>
          <p data-i18n="brandSub">Project Brief Builder</p>
        </div>
      </div>

      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('ar')">AR</button>
      </div>
    </header>

    <section id="welcomeScreen" class="screen active">
      <div class="hero-card">
        <div class="hero-content">
          <div class="badge" data-i18n="welcomeBadge"></div>
          <h1 class="hero-title" data-i18n="welcomeTitle"></h1>
          <p class="hero-desc" data-i18n="welcomeDesc"></p>
          <div class="actions">
            <button class="btn btn-primary" onclick="startQuiz()" data-i18n="startBtn"></button>
            <button class="btn btn-soft" onclick="setLanguage(currentLang === 'en' ? 'ar' : 'en')" data-i18n="switchBtn"></button>
          </div>
          <div class="trust-row">
            <div class="trust-item" data-i18n="trustOne"></div>
            <div class="trust-item" data-i18n="trustTwo"></div>
            <div class="trust-item" data-i18n="trustThree"></div>
          </div>
        </div>

        <div class="hero-visual" id="heroVisual">
          <div class="floating-card one" data-i18n="floatOne"></div>
          <div class="floating-card two" data-i18n="floatTwo"></div>
          <div class="floating-card three" data-i18n="floatThree"></div>
          <div class="phone-wrap" id="phoneWrap" aria-label="Movable phone preview">
            <div class="phone-mockup">
              <div class="phone-screen">
                <div class="mini-header"></div>
                <div class="mini-line"></div>
                <div class="mini-line medium"></div>
                <div class="mini-line short"></div>
                <div class="mini-grid">
                  <div class="mini-box" data-icon="layout"></div>
                  <div class="mini-box" data-icon="mobile"></div>
                  <div class="mini-box" data-icon="brain"></div>
                  <div class="mini-box" data-icon="chart"></div>
                </div>
                <div class="mini-line" style="margin-top: 26px;"></div>
                <div class="mini-line medium"></div>
                <div class="mini-line short"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="quizScreen" class="screen">
      <div class="quiz-card">
        <div class="quiz-header">
          <div>
            <h2 id="questionTitle" class="question-title"></h2>
            <p id="questionSubtitle" class="question-subtitle"></p>
          </div>
          <div id="stepPill" class="step-pill"></div>
        </div>

        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="progressText"></span>
            <span id="progressPercent"></span>
          </div>
          <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        </div>

        <div id="optionsGrid" class="options-grid"></div>
        <div id="formArea" class="form-area hidden"></div>
        <div id="errorBox" class="error-box"></div>

        <div class="quiz-footer">
          <button class="btn btn-soft" onclick="prevStep()" id="backBtn">Back</button>
          <div class="helper-note" id="helperNote"></div>
          <button class="btn btn-primary" onclick="nextStep()" id="nextBtn">Next</button>
        </div>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div class="result-card">

    function setLanguage(lang) {
      currentLang = lang;
      document.body.dir = lang === "ar" ? "rtl" : "ltr";
      document.documentElement.lang = lang;

      document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("active"));
      document.querySelector(`.lang-btn[onclick="setLanguage('${lang}')"]`).classList.add("active");

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (translations[lang][key]) el.innerHTML = translations[lang][key];
      });

      document.querySelectorAll("[data-icon]").forEach(el => {
        const iconKey = el.getAttribute("data-icon");
        if (icons[iconKey]) el.innerHTML = icons[iconKey];
      });

      applyBrandLogo();

      const backBtn = document.getElementById("backBtn");
      if (backBtn) backBtn.textContent = translations[lang].back;

      renderQuestion();
      if (document.getElementById("resultScreen").classList.contains("active")) renderResult();
    }

    function applyBrandLogo() {
      const html = BRAND_LOGO_SRC ? `<img src="${BRAND_LOGO_SRC}" alt="Easy App logo" />` : "EA";
      const headerLogo = document.getElementById("brandLogo");
      const thanksLogo = document.getElementById("thanksLogo");
      if (headerLogo) headerLogo.innerHTML = html;
      if (thanksLogo) thanksLogo.innerHTML = html;
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(screen => screen.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
      applyBrandLogo();
    }

    function startQuiz() {
      currentStep = 0;
      showScreen("quizScreen");
      renderQuestion();
    }

    function showError(message) {
      const box = document.getElementById("errorBox");
      box.textContent = message;
      box.style.display = "block";
    }

    function clearError() {
      const box = document.getElementById("errorBox");
      if (!box) return;
      box.textContent = "";
      box.style.display = "none";
    }

    function renderQuestion() {
      const question = questions[currentStep];
      if (!question) return;
      clearError();

      const total = questions.length;
      const percent = Math.round(((currentStep + 1) / total) * 100);
      const mark = question.required ? `<span class="required-mark">*</span>` : `<span class="optional-mark">(${translations[currentLang].optional})</span>`;

      document.getElementById("questionTitle").innerHTML = `${question.title[currentLang]} ${mark}`;
      document.getElementById("questionSubtitle").textContent = question.subtitle[currentLang];
      document.getElementById("stepPill").textContent = `${translations[currentLang].step} ${currentStep + 1} ${translations[currentLang].of} ${total}`;
      document.getElementById("progressText").textContent = `${translations[currentLang].progress}: ${currentStep + 1}/${total}`;
      document.getElementById("progressPercent").textContent = `${percent}%`;
      document.getElementById("progressFill").style.width = `${percent}%`;
      document.getElementById("backBtn").style.visibility = currentStep === 0 ? "hidden" : "visible";
      document.getElementById("nextBtn").textContent = currentStep === total - 1 ? translations[currentLang].finish : translations[currentLang].next;

      let helper = question.required ? translations[currentLang].chooseOne : translations[currentLang].optionalForm;
      if (question.type === "multiple") helper = question.required ? translations[currentLang].chooseMultiple : translations[currentLang].optionalForm;
      if (question.type === "form" || question.type === "assets") helper = question.required ? translations[currentLang].requiredForm : translations[currentLang].optionalForm;
      document.getElementById("helperNote").textContent = helper;

      const optionsGrid = document.getElementById("optionsGrid");
      const formArea = document.getElementById("formArea");
      optionsGrid.innerHTML = "";
      formArea.innerHTML = "";

      if (question.type === "form") return renderFormQuestion(question);
      if (question.type === "assets") return renderAssetsQuestion();

      optionsGrid.classList.remove("hidden");
      formArea.classList.add("hidden");

      question.options.forEach(option => {
        const stored = answers[question.id];
        const selected = question.type === "multiple"
          ? Array.isArray(stored) && stored.includes(option.en)
          : stored === option.en;

        const card = document.createElement("div");
        card.className = `option-card ${selected ? "selected" : ""}`;
        card.onclick = () => selectOption(question, option);
        card.innerHTML = `
          <div>
            <div class="option-icon">${icons[option.icon] || icons.target}</div>
            <div class="option-title">${option[currentLang]}</div>
            <div class="option-desc">${currentLang === "en" ? option.descEn : option.descAr}</div>
          </div>
        `;
        optionsGrid.appendChild(card);
      });

      if (question.hasOther && answers[question.id] === "Other") {
        formArea.classList.remove("hidden");
        formArea.innerHTML = `
          <div class="field-group custom-answer">
            <label class="field-label">${translations[currentLang].customOther} <span class="required-mark">*</span></label>
            <input class="input" value="${answers[question.id + 'Other'] || ''}" oninput="answers['${question.id}Other'] = this.value" />
          </div>
        `;
      }
    }

    function renderFormQuestion(question) {
      const optionsGrid = document.getElementById("optionsGrid");
      const formArea = document.getElementById("formArea");
      optionsGrid.classList.add("hidden");
      formArea.classList.remove("hidden");

      question.fields.forEach(field => {
        const value = answers[field.id] || "";
        const label = field[currentLang];
        const req = question.required && field.required ? `<span class="required-mark">*</span>` : "";
        const tag = field.type === "textarea"
          ? `<textarea class="textarea" placeholder="${label}" oninput="answers['${field.id}'] = this.value">${value}</textarea>`
          : `<input class="input" type="${field.type || 'text'}" value="${value}" placeholder="${label}" oninput="answers['${field.id}'] = this.value" />`;

        formArea.innerHTML += `
          <div class="field-group">
            <label class="field-label">${label} ${req}</label>
            ${tag}
          </div>
        `;
      });
    }

    function renderAssetsQuestion() {
      const optionsGrid = document.getElementById("optionsGrid");
      const formArea = document.getElementById("formArea");
      optionsGrid.classList.add("hidden");
      formArea.classList.remove("hidden");

      const selectedAssets = answers.brandAvailability || [];
      const needsLogo = selectedAssets.includes("I have a logo");
      const needsColors = selectedAssets.includes("I have brand colors");

      if (!answers.logoStatus) answers.logoStatus = needsLogo ? "" : "No logo available";
      if (!answers.colors) answers.colors = ["#0b7ff3", "#12a8ff", "#061b5b", "#0b4fd8", "#f5f9ff"];

      const colorNames = [
        translations[currentLang].color1,
        translations[currentLang].color2,
        translations[currentLang].color3,
        translations[currentLang].color4,
        translations[currentLang].color5
      ];

      let html = "";

      if (!needsLogo && !needsColors) {
        html += `<div class="success-box" style="display:block;">${currentLang === "en" ? "You did not select ready logo or brand colors, so you can continue." : "لم تختر وجود لوجو أو ألوان جاهزة، لذلك يمكنك المتابعة."}</div>`;
      }

      if (needsLogo) {
        html += `
          <div class="field-group">
            <label class="field-label">${translations[currentLang].uploadLogo} <span class="required-mark">*</span></label>
            <div class="file-upload">
              <div class="upload-row">
                <div class="logo-preview" id="logoPreview">${logoDataUrl ? `<img src="${logoDataUrl}" alt="Logo preview" />` : translations[currentLang].noLogo}</div>
                <div style="display:grid; gap:10px; flex:1; min-width:220px;">
                  <input class="input" type="file" accept="image/*" onchange="handleLogoUpload(event)" />
                  <input class="input" value="${answers.logoStatus || ''}" placeholder="${currentLang === 'en' ? 'Logo file name or note' : 'اسم ملف اللوجو أو ملاحظة'}" oninput="answers.logoStatus = this.value" />
                </div>
              </div>
            </div>
          </div>
        `;
      }

      if (needsColors) {
        html += `
          <div class="field-group">
            <label class="field-label">${currentLang === "en" ? "Brand colors palette" : "لوحة ألوان الهوية"} <span class="required-mark">*</span></label>
            <div class="color-grid">
              ${answers.colors.map((color, index) => `
                <div class="color-picker-card">
                  <span class="color-name">${colorNames[index]}</span>
                  <input type="color" value="${color}" onchange="updateColor(${index}, this.value)" />
                  <input class="input" value="${color}" oninput="updateColor(${index}, this.value)" />
                </div>
              `).join("")}
            </div>
          </div>
        `;
      }

      formArea.innerHTML = html;
    }

    function handleLogoUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      answers.logoStatus = file.name;
      const reader = new FileReader();
      reader.onload = e => {
        logoDataUrl = e.target.result;
        renderAssetsQuestion();
      };
      reader.readAsDataURL(file);
    }

    function updateColor(index, value) {
      if (!answers.colors) answers.colors = ["#0b7ff3", "#12a8ff", "#061b5b", "#0b4fd8", "#f5f9ff"];
      answers.colors[index] = value || "#000000";
      renderAssetsQuestion();
    }

    function selectOption(question, option) {
      if (question.type === "single") {
        answers[question.id] = option.en;
      }

      if (question.type === "multiple") {
        if (!Array.isArray(answers[question.id])) answers[question.id] = [];
        const exists = answers[question.id].includes(option.en);
        answers[question.id] = exists
          ? answers[question.id].filter(item => item !== option.en)
          : [...answers[question.id], option.en];
      }

      clearError();
      renderQuestion();
    }

    function validateCurrentStep() {
      const question = questions[currentStep];
      if (!question.required && question.type !== "assets") return true;

      if (question.type === "single" && !answers[question.id]) {
        showError(translations[currentLang].errorRequired);
        return false;
      }

      if (question.type === "multiple" && (!Array.isArray(answers[question.id]) || answers[question.id].length === 0)) {
        showError(translations[currentLang].errorRequired);
        return false;
      }

      if (question.hasOther && answers[question.id] === "Other" && !String(answers[question.id + "Other"] || "").trim()) {
        showError(translations[currentLang].errorForm);
        return false;
      }

      if (question.type === "form") {
        const missing = question.fields.some(field => field.required && !String(answers[field.id] || "").trim());
        if (missing) {
          showError(translations[currentLang].errorForm);
          return false;
        }
      }

      if (question.type === "assets") {
        const selectedAssets = answers.brandAvailability || [];
        const needsLogo = selectedAssets.includes("I have a logo");
        const needsColors = selectedAssets.includes("I have brand colors");
        const logoOk = !needsLogo || String(answers.logoStatus || "").trim();
        const colorsOk = !needsColors || (Array.isArray(answers.colors) && answers.colors.every(color => /^#[0-9A-Fa-f]{6}$/.test(color)));
        if (!logoOk || !colorsOk) {
          showError(translations[currentLang].errorForm);
          return false;
        }
      }

      return true;
    }

    function nextStep() {
      if (!validateCurrentStep()) return;

      if (currentStep < questions.length - 1) {
        currentStep++;
        renderQuestion();
      } else {
        renderResult();
        showScreen("resultScreen");
      }
    }

    function prevStep() {
      if (currentStep > 0) {
        currentStep--;
        renderQuestion();
      }
    }

    function getDisplayAnswer(id) {
      const value = answers[id];
      if (!value || value.length === 0) return translations[currentLang].noAnswer;
      return Array.isArray(value) ? value.join(", ") : value;
    }

    function getPlainSummary() {
      const title = currentLang === "en" ? "Easy App Project Brief Summary" : "ملخص استبيان مشروع Easy App";
      const lines = [title, `Submission version: ${submittedCount + 1}`, ""];
      getSummaryItems().forEach(item => {
        const label = currentLang === "en" ? item.labelEn : item.labelAr;
        lines.push(`${label}: ${item.value}`);
      });
      return lines.join("\n");
    }

    function renderResult() {
      const summaryGrid = document.getElementById("summaryGrid");
      summaryGrid.innerHTML = "";

      getSummaryItems().forEach(item => {
        const label = currentLang === "en" ? item.labelEn : item.labelAr;
        const isColors = item.labelEn === "Brand Colors";
        const colorDots = isColors && Array.isArray(answers.colors)
          ? `<div class="color-summary">${answers.colors.map(color => `<div class="color-dot" style="background:${color}" title="${color}"></div>`).join("")}</div>`
          : "";

        summaryGrid.innerHTML += `
          <div class="summary-item">
            <span>${label}</span>
            <strong>${item.value}</strong>
            ${colorDots}
          </div>
        `;
      });
    }

    async function submitBrief() {
      const submitBtn = document.getElementById("submitBtn");
      const status = document.getElementById("submitStatus");
      const error = document.getElementById("submitError");

      status.style.display = "none";
      error.style.display = "none";

      if (!FORM_ENDPOINT || FORM_ENDPOINT.includes("YOUR_FORM_ID")) {
        error.textContent = currentLang === "en"
          ? "Add your Formspree endpoint first inside FORM_ENDPOINT."
          : "أضف رابط Formspree أولًا داخل FORM_ENDPOINT.";
        error.style.display = "block";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = translations[currentLang].submitting;

      const payload = {
        _subject: `Easy App Project Brief - ${answers.clientName || "New Client"} - Version ${submittedCount + 1}`,
        name: answers.clientName || "",
        email: answers.email || "",
        phone: answers.phone || "",
        message: getPlainSummary(),
        logo_file_name: answers.logoStatus || "",
        submission_version: submittedCount + 1
      };

      try {
        const res = await fetch(FORM_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error("Submission failed");

        submittedCount++;
        status.textContent = translations[currentLang].submitSuccess;
        status.style.display = "block";
        showScreen("thanksScreen");
      } catch (err) {
        error.textContent = translations[currentLang].submitError;
        error.style.display = "block";
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = translations[currentLang].submitBtn;
      }
    }

    function printSummary() {
      window.print();
    }

    function editAnswers() {
      currentStep = 0;
      showScreen("quizScreen");
      renderQuestion();
    }

    function restartQuiz() {
      currentStep = 0;
      answers = {};
      logoDataUrl = "";
      submittedCount = 0;
      showScreen("welcomeScreen");
    }

    function makePhoneDraggable() {
      const phone = document.getElementById("phoneWrap");
      const parent = document.getElementById("heroVisual");
      let dragging = false;
      let startX = 0;
      let startY = 0;
      let currentX = 0;
      let currentY = 0;

      const start = (e) => {
        dragging = true;
        const p = e.touches ? e.touches[0] : e;
        startX = p.clientX - currentX;
        startY = p.clientY - currentY;
      };

      const move = (e) => {
        if (!dragging) return;
        e.preventDefault();
        const p = e.touches ? e.touches[0] : e;
        currentX = p.clientX - startX;
        currentY = p.clientY - startY;

        const maxX = Math.max(40, parent.clientWidth / 2 - 120);
        const maxY = Math.max(40, parent.clientHeight / 2 - 120);

        currentX = Math.max(-maxX, Math.min(maxX, currentX));
        currentY = Math.max(-maxY, Math.min(maxY, currentY));

        phone.style.transform = `translate(${currentX}px, ${currentY}px)`;
      };

      const end = () => {
        dragging = false;
      };

      phone.addEventListener("mousedown", start);
      window.addEventListener("mousemove", move);
      window.addEventListener("mouseup", end);
      phone.addEventListener("touchstart", start, { passive: false });
      window.addEventListener("touchmove", move, { passive: false });
      window.addEventListener("touchend", end);
    }

    setLanguage("en");
    makePhoneDraggable();
  </script>
</body>
